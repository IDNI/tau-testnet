# 4-node stake-switch demo network.
#
# All nodes run from the SAME standalone image, share one genesis.json, and have
# BACKGROUND MINING DISABLED — blocks are produced only via the scenario script's
# `createblock` RPC (no fork races on stage). Auto-faucet is OFF (a faucet would
# mint phantom stake). createblock arrives over the published loopback port from
# the docker gateway (non-127.0.0.1 inside the container), so remote createblock
# is explicitly allowed for the demo.
#
# Run:  docker compose -f demo/docker-compose.yml --env-file demo/.env up -d --build
#
# Env var names verified against config.py _ENV_VALUE_CASTERS.

networks:
  taudemo:
    ipam:
      config:
        - subnet: 172.28.0.0/24

x-node-common: &node-common
  image: tau-testnet-standalone:demo
  restart: unless-stopped
  networks:
    taudemo:

services:
  node1:
    <<: *node-common
    build:
      context: ..
      dockerfile: Dockerfile.standalone
    container_name: tau-demo-node1
    networks:
      taudemo:
        ipv4_address: 172.28.0.11
    volumes:
      - ./node1/data:/data
      - ./node1/identity.key:/data/identity.key:ro
      - ./node1/genesis.json:/app/tau-testnet/data/genesis.json:ro
    ports:
      - "127.0.0.1:65441:65432"
    environment:
      TAU_NETWORK_ID: tau-demo-stake
      TAU_MINER_PRIVKEY: ${NODE1_PRIVKEY}
      TAU_MINING_ENABLED: "false"
      TAU_AUTO_FAUCET: "false"
      TAU_ALLOW_REMOTE_CREATEBLOCK: "true"
      TAU_NETWORK_LISTEN: /ip4/0.0.0.0/tcp/4001
      TAU_IDENTITY_KEY_PATH: /data/identity.key
      TAU_DB_PATH: /data/node.db

  node2:
    <<: *node-common
    container_name: tau-demo-node2
    depends_on: [node1]
    networks:
      taudemo:
        ipv4_address: 172.28.0.12
    volumes:
      - ./node2/data:/data
      - ./node2/identity.key:/data/identity.key:ro
      - ./node2/genesis.json:/app/tau-testnet/data/genesis.json:ro
    ports:
      - "127.0.0.1:65442:65432"
    environment:
      TAU_NETWORK_ID: tau-demo-stake
      TAU_MINER_PRIVKEY: ${NODE2_PRIVKEY}
      TAU_MINING_ENABLED: "false"
      TAU_AUTO_FAUCET: "false"
      TAU_ALLOW_REMOTE_CREATEBLOCK: "true"
      TAU_NETWORK_LISTEN: /ip4/0.0.0.0/tcp/4001
      TAU_IDENTITY_KEY_PATH: /data/identity.key
      TAU_DB_PATH: /data/node.db
      TAU_BOOTSTRAP_PEERS: '[{"peer_id":"${NODE1_PEER_ID}","addrs":["/ip4/172.28.0.11/tcp/4001"]}]'

  node3:
    <<: *node-common
    container_name: tau-demo-node3
    depends_on: [node1]
    networks:
      taudemo:
        ipv4_address: 172.28.0.13
    volumes:
      - ./node3/data:/data
      - ./node3/identity.key:/data/identity.key:ro
      - ./node3/genesis.json:/app/tau-testnet/data/genesis.json:ro
    ports:
      - "127.0.0.1:65443:65432"
    environment:
      TAU_NETWORK_ID: tau-demo-stake
      TAU_MINER_PRIVKEY: ${NODE3_PRIVKEY}
      TAU_MINING_ENABLED: "false"
      TAU_AUTO_FAUCET: "false"
      TAU_ALLOW_REMOTE_CREATEBLOCK: "true"
      TAU_NETWORK_LISTEN: /ip4/0.0.0.0/tcp/4001
      TAU_IDENTITY_KEY_PATH: /data/identity.key
      TAU_DB_PATH: /data/node.db
      TAU_BOOTSTRAP_PEERS: '[{"peer_id":"${NODE1_PEER_ID}","addrs":["/ip4/172.28.0.11/tcp/4001"]}]'

  node4:
    <<: *node-common
    container_name: tau-demo-node4
    depends_on: [node1]
    networks:
      taudemo:
        ipv4_address: 172.28.0.14
    volumes:
      - ./node4/data:/data
      - ./node4/identity.key:/data/identity.key:ro
      - ./node4/genesis.json:/app/tau-testnet/data/genesis.json:ro
    ports:
      - "127.0.0.1:65444:65432"
    environment:
      TAU_NETWORK_ID: tau-demo-stake
      TAU_MINER_PRIVKEY: ${NODE4_PRIVKEY}
      TAU_MINING_ENABLED: "false"
      TAU_AUTO_FAUCET: "false"
      TAU_ALLOW_REMOTE_CREATEBLOCK: "true"
      TAU_NETWORK_LISTEN: /ip4/0.0.0.0/tcp/4001
      TAU_IDENTITY_KEY_PATH: /data/identity.key
      TAU_DB_PATH: /data/node.db
      TAU_BOOTSTRAP_PEERS: '[{"peer_id":"${NODE1_PEER_ID}","addrs":["/ip4/172.28.0.11/tcp/4001"]}]'
